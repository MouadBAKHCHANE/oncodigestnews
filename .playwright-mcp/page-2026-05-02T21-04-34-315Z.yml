            - listitem [ref=e484]:
              - generic [ref=e485] [cursor=pointer]:
                - generic [ref=e486]: Qui sont les conseillers privés RockFi ?
                - img [ref=e489]
              - paragraph [ref=e494]: "Nos conseillers sont d’anciens banquiers privés, expérimentés, indépendants, cooptés et triés sur le volet. Leur seule priorité : vos priorités."
            - listitem [ref=e495]:
              - generic [ref=e496] [cursor=pointer]:
                - generic [ref=e497]: À partir de quel montant peut-on devenir client ?
                - img [ref=e500]
              - paragraph [ref=e505]: Notre service est conçu pour les patrimoines ambitieux, mais nous adaptons nos solutions selon le contexte. Contactez-nous pour une évaluation personnalisée afin de savoir si RockFi est fait pour vous.
            - listitem [ref=e506]:
              - generic [ref=e507] [cursor=pointer]:
                - generic [ref=e508]: Quel est le rôle de la technologie dans votre accompagnement ?
                - img [ref=e511]
              - paragraph [ref=e516]: "Elle permet de donner de la clarté et de la visibilité : reporting consolidé, historique des mouvements, projections. Son objectif est de renforcer la confiance dans la relation, pas de remplacer le conseil humain."
            - listitem [ref=e517]:
              - generic [ref=e518] [cursor=pointer]:
                - generic [ref=e519]: Quels produits / solutions propose RockFi ?
                - img [ref=e522]
              - paragraph [ref=e527]: "Nous proposons une large gamme de produits, sélectionnés pour leur performance : assurance vie (France & Luxembourg), fonds structurés, private equity, SCPI, PEA, comptes-titres, mandats personnalisés. Ces produits sont avant tout au service d’une stratégie : votre conseiller vous oriente vers ceux qui répondent le plus efficacement à vos besoins."
            - listitem [ref=e528]:
              - generic [ref=e529] [cursor=pointer]:
                - generic [ref=e530]: Que se passe-t-il si vos objectifs changent ?
                - img [ref=e533]
              - paragraph [ref=e538]: Votre stratégie peut évoluer. Nous adaptons nos plans, arbitrages et allocations selon vos nouvelles priorités, votre situation familiale ou économique.
            - listitem [ref=e539]:
              - generic [ref=e540] [cursor=pointer]:
                - generic [ref=e541]: Comment vos données sont-elles protégées ?
                - img [ref=e544]
              - paragraph [ref=e549]: Nous utilisons des protocoles de sécurité, architecture et cryptage ultra sécurisés de niveau bancaire. Vos données sont confidentielles, utilisées uniquement pour votre accompagnement. Vos conseillers n'ont aucun droit d'écriture et d'accès à votre espace.
