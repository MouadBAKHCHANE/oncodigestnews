          - generic [ref=e160]:
            - generic [ref=e161]:
              - heading "Bonjour Marie, est-ce que tu peux te présenter en quelques mots ?" [level=2] [ref=e162]
              - paragraph [ref=e163]: "Bonjour, je m’appelle Marie, j’ai 30 ans, et je partage ma vie entre Paris et Montpellier, où j’ai fait un grand pas il y a peu en achetant une maison à rénover. C’est un projet qui me tient à cœur, mêlant mon goût pour le design et l’envie de créer un espace qui me ressemble, tout en jonglant avec les imprévus du quotidien. Après plusieurs années à Paris, dans le conseil et en immobilier, j’ai eu envie de nouvelles aventures : il y a cette maison à rénover avec la Méditerranée en toile de fond et puis évidemment cette nouvelle aventure entrepreneuriale avec RockFi !"
              - paragraph [ref=e164]: ‍
            - generic [ref=e165]:
              - heading "Peux-tu nous raconter un peu ton parcours ?" [level=2] [ref=e166]
              - paragraph [ref=e167]: J’ai fait HEC puis j’ai rejoint le cabinet de conseil Artefact comme consultante data. J’ai ensuite intégré Beanstock parmi les premiers salariés, en tant que Directrice des Opérations.
              - paragraph [ref=e168]: J’ai monté plusieurs équipes — architectes, juristes, gestion locative, courtage — et structuré tout le département des Opérations. C’était une expérience très excitante, où j’ai pu mettre en place des process automatisés et recentrer l’activité sur l’accompagnement personnalisé des clients, en particulier les primo-accédants.
              - paragraph [ref=e169]: "En parallèle, je me suis formée au Product Management, pour développer la partie tech et produit : nous nous sommes donné un an pour lancer une application pour les agents immobiliers, une application pour les clients et construire de zéro notre back-office interne afin de créer une structure tech solide et performante pour accompagner notre croissance."
              - paragraph [ref=e170]: ‍
            - generic [ref=e171]:
              - heading "Pourquoi et comment as-tu décidé de co-fonder RockFi ?" [level=2] [ref=e172]
              - paragraph [ref=e173]: "L’histoire est assez surprenante, car je ne pensais pas suivre cette voie au départ : c’est un domaine où mes parents évoluent depuis 35 ans."
              - paragraph [ref=e174]: Mais j’ai fait la rencontre de Pierre Marin il y a un peu plus d’un an, qui m’a parlé de son projet… dans la gestion de patrimoine. J’ai adoré son énergie et le projet m’est apparu comme une évidence ! D’une part, mon expérience dans les opérations en Proptech me donnait une vision claire du potentiel technologique offert dans le secteur financier. D’autre part, j’ai pensé à mes parents, eux-mêmes CGPs, que j’ai tellement souvent entendus se plaindre de la complexité croissante liée à la conformité et à l’administratif dans la gestion de patrimoine. La lourdeur de l’admin les coupe du cœur de leur métier, c’est-à-dire du temps consacré à leurs clients.
              - figure [ref=e175]
              - paragraph [ref=e177]: ‍
            - generic [ref=e178]:
              - heading "Peux-tu nous en dire plus sur l’expérience de gestionnaire de patrimoine et comment la tech peut transformer radicalement leur expérience ?" [level=2] [ref=e179]
              - paragraph [ref=e180]: C’est un métier fantastique, où peut se nouer un vrai lien, une vraie relation d’intimité avec un client, sa famille, parfois sur plusieurs générations. Cette dimension “humaine”, c’est la première chose dont vous parlera un banquier privé ou CGP lorsqu’il vous parlera de son métier. Et puis… il vous parlera de la complexité de l’admin.
              - figure [ref=e181]
              - paragraph [ref=e183]: "Aujourd’hui, il y a une vraie contradiction dans l’expérience d’un CGP ou d’un banquier privé : toujours plus d’administratif, de contraintes, d’outils à intégrer… avec la nécessité d’être présent avec ses clients. Ces injonctions sont contradictoires et comme on ne peut pas éviter la compliance ou l’admin, c’est le temps consacré au client qui en souffre."
              - paragraph [ref=e184]: "Mais cette conviction doit être précisée : sur le marché de la gestion de patrimoine, le “full tech” ne fonctionne pas, le conseil humain est irremplaçable dans notre secteur. Chez RockFi, nous concevons la tech comme un outil, c’est à dire un levier au service de la relation : elle enrichit, elle ne remplace pas. On travaille ainsi à automatiser tout ce qui n’apporte pas de réelle valeur : l’administratif, les informations « froides » et standardisées. Tout l’enjeu, c’est de recentrer le métier sur la vraie valeur ajoutée : passer du temps avec les clients, leur offrir un conseil personnalisé, adapté à leurs projets de vie et à leurs expériences."
              - paragraph [ref=e185]: ‍
              - generic [ref=e186]:
                - heading "Nos clients ne cherchent pas un produit. Ils attendent un accompagnement." [level=2] [ref=e187]
                - link "Devenir client RockFi" [ref=e188] [cursor=pointer]:
                  - /url: /contact-particulier
                  - generic [ref=e189]: Devenir client RockFi
                  - img [ref=e191]
            - generic [ref=e195]:
              - heading "As-tu des exemples d’opportunités identifiées avec vos gestionnaires sur lesquelles vous travaillez ?" [level=2] [ref=e196]
              - paragraph [ref=e197]: Oui, on a identifié plusieurs opportunités, et l’une des plus prometteuses aujourd’hui est l’Intelligence Artificielle, qui ouvre des possibilités incroyables en matière de personnalisation.
              - list [ref=e198]:
                - listitem [ref=e199]: Le premier exemple, c’est l’idée d’une allocation d’actifs ultra personnalisée grâce à l’IA. Aujourd’hui, un banquier conseille une allocation, mais il n’a pas les outils pour suivre de près et au quotidien l’ensemble des portefeuilles de ses clients. La conséquence, c’est que des clients se retrouvent avec des allocations où il ne se passe rien pendant 10 ans. Or chaque semaine, chaque jour même des actualités marchés sont susceptibles d’impacter l’exposition au risque et donc l’allocation d’actif. Si une IA est capable d’analyser le marché tous les jours et d’alerter sur les signaux faibles, on a envie de tirer le fil et de concevoir une allocation dynamique où chaque client est informé en temps réel des risques, et où son conseiller peut lui proposer proactivement des arbitrages. On a même envie d’aller jusqu’à hyper personnaliser chaque newsletter envoyée aux clients avec des alertes et des actus de marché ciblées et en lien avec son portefeuille.
                - listitem [ref=e200]: Le deuxième exemple, c’est la possibilité d’offrir aux clients un reporting 360° pour visualiser leur portefeuille sous gestion et leur patrimoine de manière holistique. Avoir une vue centralisée permet aux conseillers d’opérer de meilleures analyses, mais aussi de définir des stratégies et recommandations beaucoup plus adaptées et personnalisées.
              - paragraph [ref=e201]: "Ce sont deux exemples parmi beaucoup d’autres : nous nous focalisons en priorité sur le règlement des points de friction, mais la tech peut nous servir aussi à ouvrir de nouveaux territoires d’opportunités pour nos gestionnaires."
              - figure [ref=e202]
              - paragraph [ref=e203]: ‍
            - generic [ref=e204]:
              - heading "On a beaucoup parlé de l’expérience actuelle des gestionnaires, tu peux nous en dire plus peut-être sur l’expérience client et leurs “pain points” ? Nous donner des exemples ?" [level=2] [ref=e205]
              - paragraph [ref=e206]:
                - text: Il y a
                - strong [ref=e207]: deux points de friction essentiels
                - text: ", dont je parlais plus tôt."
              - paragraph [ref=e208]:
                - text: Le premier, c’est
                - strong [ref=e209]: la lourdeur du parcours de souscription.
                - text: Il y a un problème de communication autour de l’ensemble des documents à signer. Les clients les signent sans jamais vraiment comprendre pourquoi. Ils valident une démarche, puis trois mois plus tard, on leur demande de signer encore, sans qu’il n’y ait eu de changement réel. Tout ça constitue une complexité administrative qui alourdit le processus et crée une frustration évitable. Notre enjeu, c’est de redonner du sens à la conformité.
              - paragraph [ref=e210]:
                - text: Le second point,
                - strong [ref=e211]: c’est le manque de personnalisation du conseil.
                - text: "Trop souvent, on parle aux clients de produits ou de structures qu’ils ne connaissent pas, sans leur expliquer pourquoi c’est la meilleure solution pour eux. On a tendance à proposer directement des produits complexes sans avoir construit et validé une stratégie claire. Chez RockFi, on fait les choses différemment : on commence par définir une stratégie globale et personnalisée, puis les produits et outils viennent ensuite, en fonction des objectifs. Si ça colle dès le départ, parfait. Sinon, on ajuste. L’essentiel, c’est que les produits servent la stratégie, pas l’inverse."
              - paragraph [ref=e212]: ‍
            - generic [ref=e213]:
              - 'heading "Vous opérez en fait une double transformation : en transformant l’expérience des gestionnaires, c’est l’expérience pour le client que vous transformez ?" [level=2] [ref=e214]'
              - paragraph [ref=e215]: "Notre vision est claire : simplifier la gestion privée pour mieux servir nos clients. L’enjeu est de résoudre les problèmes des clients, mais pour ça, il faut d’abord s’attaquer aux blockers des banquiers. C’est un pré-requis évident pour nous. En libérant leur temps et en plaçant leur performance au centre de nos actions, on améliore directement la satisfaction client avec des conseillers plus disponibles, proactifs et efficaces."
              - paragraph [ref=e216]: ‍
            - generic [ref=e217]:
              - heading "Qui sont vos clients aujourd’hui ?" [level=2] [ref=e218]
              - paragraph [ref=e219]: Nos clients sont principalement des entrepreneurs, des sportifs ou des artistes, des dirigeants d’entreprises, et de jeunes générations qui accèdent à un héritage. Leur point commun, c’est qu’ils ont tous envie d’un modèle plus simple et performant.
              - figure [ref=e220]
              - paragraph [ref=e221]: "Plus largement, on assiste aujourd’hui à un transfert de richesse sans précédent. En France, 16 millions de personnes âgées de 60 à 80 ans vont transmettre des centaines de milliards d’euros à leurs enfants. C’est le plus grand transfert de patrimoine de l’histoire. Ces deux générations ont des besoins très différents : les premiers vont avoir besoin de conseils personnalisés, tandis que les seconds rechercheront des solutions plus technologiques. Notre objectif est donc double : accompagner les premiers dans ce processus de transmission et anticiper les attentes des seconds, afin de devenir la référence en gestion privée pour cette nouvelle génération."
              - paragraph [ref=e222]: ‍
            - generic [ref=e223]:
              - heading "Tu peux nous en dire plus sur cette expérience client ?" [level=2] [ref=e224]
              - paragraph [ref=e225]: "Je peux te donner trois de nos axes de réflexion :"
              - paragraph [ref=e226]:
                - emphasis [ref=e227]: 1. Une expérience intime
              - paragraph [ref=e228]: L’expérience client en gestion de patrimoine est très particulière, car on rentre vraiment dans l’intimité du client. On parle d’argent, de situation familiale, de contexte fiscal, et de projets de vie à plus ou moins long terme. Parfois, ça touche des sujets délicats comme un décès ou un divorce. Tu pénètres dans l’univers personnel et familial du client, et ça demande beaucoup de subtilité et d’élégance. Le client te confie des informations très sensibles, donc il est crucial de bâtir une relation de confiance. C’est ce qui rend l’expérience client à la fois passionnante et complexe. On ne peut pas tout automatiser, car la technologie est par nature impersonnelle. Ce qui compte vraiment, c’est la qualité de la relation humaine entre le conseiller et son client.
              - paragraph [ref=e229]:
                - emphasis [ref=e230]: 2. La célébration des victoires
              - paragraph [ref=e231]: "Il y a des moments particuliers dans cette expérience que l’on a envie de soigner particulièrement et notamment : le moment de la célébration des victoires de nos clients. La question ici c’est comment mettre en valeur les succès, performances et milestones importants de la gestion d’un patrimoine ? Chaque client va approcher cette idée de célébration à sa manière. Mais ce n’est jamais un moment anodin. L’héritage familial ou les fruits d’une vie de travail sont souvent le résultat de nombreux choix et de risques pris au fil du temps. Prendre le temps de reconnaître ces réussites, c’est un élément clé dans l’expérience client."
              - paragraph [ref=e232]:
                - emphasis [ref=e233]: 3. Nourrir les passions
              - paragraph [ref=e234]: On travaille aussi beaucoup autour des passions de nos clients. On essaie de construire des expériences personnalisées autour de ce qui les anime et les fait vibrer. Les passions, c’est quelque chose de très personnel, et ça se lie naturellement à la gestion de patrimoine, car en fin de compte, on aide les clients à accomplir des projets qui leur tiennent à cœur. Ce qui anime tout le monde, c’est la possibilité de pouvoir vivre pleinement ses passions, et notre rôle est de les aider à y parvenir.
              - figure [ref=e235]
              - paragraph [ref=e236]: ‍
            - generic [ref=e237]:
              - heading "Comment travaillez-vous ?" [level=2] [ref=e238]
              - paragraph [ref=e239]: On travaille beaucoup avec des méthodologies de design — en intégrant nos clients ou banquiers privés dans la réflexion, comme le point de départ de toute construction.
              - list [ref=e240]:
                - listitem [ref=e241]: Une vraie phase d’observation. Au début, nous avons mené une phase d’observation « sous-marin » pendant plus de six mois avec cinq à six conseillers pour observer au plus près la relation client et identifier les pain-points et les points forts.
                - listitem [ref=e242]:
                  - text: Ensuite, une phase de
                  - strong [ref=e243]:
                    - emphasis [ref=e244]: co-construction et d’idéation
                  - text: avec toutes les parties prenantes, en collaborant notamment avec des spécialistes en design d’expérience. On aborde volontairement ce stade avec beaucoup de naïveté et de candeur, pour éviter les idées reçues et les biais. L’objectif est de sortir des modèles existants et de penser différemment. On implique évidemment des clients volontaires et des CGPs, que l’on considère comme de vrais partenaires beta testeurs dans notre approche. Cela nous permet d’établir
                  - strong [ref=e245]:
                    - emphasis [ref=e246]: une vision cible
                  - text: qui sert de boussole. À ce moment-là, tout nous semblait possible, et cela nous a guidés vers ce qui pourrait constituer la meilleure expérience pour nos clients.
              - paragraph [ref=e247]:
                - text: On est dans une
                - emphasis [ref=e248]: démarche d’amélioration constante
                - text: ": on questionne, on teste, on apprend, on améliore, puis on déploie à l’échelle. Et on continue de challenger l’existant pour toujours optimiser davantage l’expérience pour nos CGPs et clients."
              - figure [ref=e249]
              - paragraph [ref=e250]: ‍
              - generic [ref=e251]:
                - heading "Un mot pour conclure ?" [level=3] [ref=e252]
                - paragraph [ref=e253]: Rejoignez-nous ! On a pour objectif de tripler nos effectifs d’ici fin 2025, on cherche des talents pour rejoindre nos départements Product Management et Opérations et donner un nouveau souffle à la gestion de patrimoine ! N’hésitez pas à m’écrire si vous souhaitez rejoindre l’aventure !
          - generic [ref=e254]:
            - heading "Découvrez notre FAQ" [level=3] [ref=e255]
            - list [ref=e257]:
              - listitem [ref=e258]:
                - generic [ref=e259]:
                  - generic [ref=e260] [cursor=pointer]:
                    - generic [ref=e261]: Puis-je retrouver mes contrats existants dans RockFi ?
                    - img [ref=e263]
