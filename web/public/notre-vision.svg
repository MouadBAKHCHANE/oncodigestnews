  <ellipse cx="450" cy="500" rx="295" ry="455" stroke="#cdc6ad" stroke-width="1" opacity="0.65"/>
  <ellipse cx="450" cy="500" rx="230" ry="430" stroke="#c2ba9d" stroke-width="0.9" opacity="0.5"/>
  <ellipse cx="450" cy="500" rx="160" ry="395" stroke="#bab28e" stroke-width="0.8" opacity="0.4"/>
  <ellipse cx="450" cy="500" rx="80" ry="360" stroke="#b3aa80" stroke-width="0.6" opacity="0.3"/>

  <!-- Subtle vertical ribbon highlights -->
